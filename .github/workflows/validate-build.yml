name: Validate build

on:
  push:
  pull_request:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Pack template
        working-directory: src/PvZRModTemplate
        run: dotnet pack -c Release
